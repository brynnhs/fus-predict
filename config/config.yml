# fus-predict configuration
# --------------------------
# All pipeline parameters live here. Scripts read this via
# project.load_project_config() and never hardcode values.

# ---------------------------------------------------------------------------
# Paths (relative to repo root)
# ---------------------------------------------------------------------------
paths:
  sourcedata:    data/sourcedata
  preprocessing: derivatives/preprocessing
  modeling:      derivatives/modeling

# ---------------------------------------------------------------------------
# Subjects
# ---------------------------------------------------------------------------
subjects:
  all:
    - secundo
  sessions_to_exclude:
    secundo: [Se05022020, Se22102019, Se25082020, Se27072020, Se31012020]

# ---------------------------------------------------------------------------
# Preprocessing
# ---------------------------------------------------------------------------
preprocessing:

  period: both       # baseline | task | both

  baseline:
    apply_log10: true
    log10_eps:   1.0e-6
    overwrite:   true

  geometry:
    rotate_k:    -1
    target_size: 112
    save_previews: true
    overwrite:   true
    flip_session_ids_by_subject:
      secundo: [Se04092020, Se01092020, Se25082020, Se03092020, Se27082020, Se04082020, Se24022020]

  filtering:
    enable_lowpass:     false
    lowpass_cutoff_hz:  0.5
    lowpass_order:      4
    enable_highpass:    false
    highpass_cutoff_hz: 0.01
    highpass_order:     3
    enable_clip:        false
    clip_bottom:        1.0
    clip_top:           99.0
    fps_fallback:       2.5
    overwrite:          true

  standardization:
    eps:               1.0e-8
    floor_percentile:  10.0
    clip_abs:          3.0
    smooth_kernel_sizes: []
    causal:            true
    overwrite:         true

  tissue_segmentation:
    vessel_intensity_percentile: 75.0
    vessel_cv_percentile:        75.0
    min_vessel_pixels:           2500
    closing_radius:              1
    overwrite:                   true

# ---------------------------------------------------------------------------
# Signal characterization
# ---------------------------------------------------------------------------
persistence_analysis:
  min_var:               1.0e-6
  fps_fallback:          2.5
  max_acf_lag:           20
  example_target_frame:  10
  pearson_rolling_window: 20
  acf_patch_sizes: [1, 5, 10, 14, 20, 28]
  summary_lags: [5, 10, 20]

# ---------------------------------------------------------------------------
# AR / modeling
# ---------------------------------------------------------------------------
ar_analysis:
  patch_lag_pca_ar_patch_size: 14
  primary_session_id:          Se25082020
  # Must match subjects.sessions_to_exclude.secundo
  within_session_exclude: [Se05022020, Se22102019, Se25082020, Se27072020, Se31012020]

modeling:
  frame_rate:    2.5
  train_frac:    0.8
  n_lags:        10
  horizons:      [1, 5, 10]

  pixel_ar:
    ridge_lambda: 0.01

  full_frame_pca_ar:
    n_components: 10
    ridge_lambda: 0.01

  patch_lag_pca_ar:
    patch_size:   14
    n_components: 10
    ridge_lambda: 0.01

  convlstm:
    hidden_channels:  32
    kernel_size:      3
    n_layers:         1
    forget_gate_bias: 1.0
    learning_rate:    3.0e-4
    batch_size:       128
    n_epochs:         50
    grad_clip_norm:   1.0

  pca_basis:
    max_frames: 2000
    seed:       42
    use_torch:  true
    device:     cuda